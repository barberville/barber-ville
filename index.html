<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barber Ville</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:#fff;
}

.hidden{
display:none;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.logo{
width:140px;
height:140px;
border-radius:50%;
overflow:hidden;
margin-bottom:20px;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
font-size:60px;
margin-bottom:10px;
}

.subtitle{
color:#aaa;
margin-bottom:40px;
}

.btn{
padding:18px 40px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
cursor:pointer;
border:1px solid #222;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.service{
padding:25px;
background:#111;
border-radius:20px;
cursor:pointer;
border:2px solid #222;
}

.service.active{
background:#fff;
color:#000;
}

.title{
text-align:center;
font-size:40px;
margin-top:40px;
margin-bottom:10px;
}

.desc{
text-align:center;
color:#aaa;
margin-bottom:40px;
}

</style>

</head>

<body>

<div class="hero" id="home">

<div class="logo">
<img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033?q=80&w=1200&auto=format&fit=crop">
</div>

<h1>Barber Ville</h1>

<p class="subtitle">
Agenda Aqui
</p>

<button class="btn" onclick="openProfessionals()">
Entrar
</button>

</div>

<div class="container hidden" id="professionals">

<h2 class="title">
Escolha o barbeiro
</h2>

<p class="desc">
Selecione o profissional
</p>

<div class="cards">

<div class="card" onclick="selectProfessional('Breno')">

<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1200&auto=format&fit=crop">

<div class="card-content">
<h3>Breno</h3>
</div>

</div>

<div class="card" onclick="selectProfessional('Daniel')">

<img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=1200&auto=format&fit=crop">

<div class="card-content">
<h3>Daniel</h3>
</div>

</div>

</div>

</div>

<div class="container hidden" id="servicesSection">

<h2 class="title">
Escolha os serviços
</h2>

<p class="desc">
Você pode escolher mais de um serviço
</p>

<div class="services">

<div class="service" onclick="toggleService(this)">
Corte
</div>

<div class="service" onclick="toggleService(this)">
Barba
</div>

<div class="service" onclick="toggleService(this)">
Sobrancelha
</div>

<div class="service" onclick="toggleService(this)">
Pigmentação
</div>

<div class="service" onclick="toggleService(this)">
Corte + Barba
</div>

</div>

</div>

<script>

function openProfessionals(){

document.getElementById('home').classList.add('hidden');

document.getElementById('professionals').classList.remove('hidden');

}

function selectProfessional(name){

document.getElementById('professionals').classList.add('hidden');

document.getElementById('servicesSection').classList.remove('hidden');

}

function toggleService(element){

element.classList.toggle('active');

}

</script>

</body>
</html>
